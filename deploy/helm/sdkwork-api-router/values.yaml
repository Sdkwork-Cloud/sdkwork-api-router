replicaCount: 1

image:
  repository: ghcr.io/<owner>/sdkwork-api-router
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: sdkwork-router.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

podAnnotations: {}

automountServiceAccountToken: false

podSecurityContext:
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

bootstrapProfile: prod
browserAllowedOrigins: ""

binds:
  web: 0.0.0.0:3001
  gateway: 127.0.0.1:8080
  admin: 127.0.0.1:8081
  portal: 127.0.0.1:8082

userCenter:
  mode: builtin-local
  providerKey: sdkwork-api-router-local
  appId: sdkwork-api-router
  localApiBasePath: /api/app/v1/user-center
  sqlitePath: /opt/sdkwork/data/user-center.db
  schemaName: ""
  tablePrefix: rp_uc_
  appApiBaseUrl: ""
  externalBaseUrl: ""
  secretId: ""
  authorizationHeaderName: Authorization
  accessTokenHeaderName: Access-Token
  refreshTokenHeaderName: Refresh-Token
  sessionHeaderName: x-sdkwork-user-center-session-id
  authorizationScheme: Bearer
  allowAuthorizationFallbackToAccessToken: true
  handshakeFreshnessWindowMs: 30000

secrets:
  existingSecret: ""
  databaseUrl: ""
  adminJwtSigningSecret: ""
  portalJwtSigningSecret: ""
  credentialMasterKey: ""
  metricsBearerToken: ""
  userCenterDatabaseUrl: ""
  userCenterSharedSecret: ""
