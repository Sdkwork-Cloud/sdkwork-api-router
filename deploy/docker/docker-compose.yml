services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SDKWORK_POSTGRES_DB:-sdkwork_api_router}
      POSTGRES_USER: ${SDKWORK_POSTGRES_USER:-sdkwork}
      POSTGRES_PASSWORD: ${SDKWORK_POSTGRES_PASSWORD:?set in deploy/docker/.env}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sdkwork-postgres:/var/lib/postgresql/data

  router:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SDKWORK_DATABASE_URL: postgresql://${SDKWORK_POSTGRES_USER:-sdkwork}:${SDKWORK_POSTGRES_PASSWORD:?set in deploy/docker/.env}@postgres:5432/${SDKWORK_POSTGRES_DB:-sdkwork_api_router}
      SDKWORK_BOOTSTRAP_PROFILE: ${SDKWORK_BOOTSTRAP_PROFILE:-prod}
      SDKWORK_BOOTSTRAP_DATA_DIR: /opt/sdkwork/data
      SDKWORK_ADMIN_SITE_DIR: /opt/sdkwork/sites/admin/dist
      SDKWORK_PORTAL_SITE_DIR: /opt/sdkwork/sites/portal/dist
      SDKWORK_WEB_BIND: 0.0.0.0:3001
      SDKWORK_GATEWAY_BIND: 127.0.0.1:8080
      SDKWORK_ADMIN_BIND: 127.0.0.1:8081
      SDKWORK_PORTAL_BIND: 127.0.0.1:8082
      SDKWORK_ADMIN_JWT_SIGNING_SECRET: ${SDKWORK_ADMIN_JWT_SIGNING_SECRET:?set in deploy/docker/.env}
      SDKWORK_PORTAL_JWT_SIGNING_SECRET: ${SDKWORK_PORTAL_JWT_SIGNING_SECRET:?set in deploy/docker/.env}
      SDKWORK_CREDENTIAL_MASTER_KEY: ${SDKWORK_CREDENTIAL_MASTER_KEY:?set in deploy/docker/.env}
      SDKWORK_METRICS_BEARER_TOKEN: ${SDKWORK_METRICS_BEARER_TOKEN:?set in deploy/docker/.env}
      SDKWORK_BROWSER_ALLOWED_ORIGINS: ${SDKWORK_BROWSER_ALLOWED_ORIGINS:-http://localhost:3001}
      SDKWORK_USER_CENTER_MODE: ${SDKWORK_USER_CENTER_MODE:-builtin-local}
      SDKWORK_USER_CENTER_PROVIDER_KEY: ${SDKWORK_USER_CENTER_PROVIDER_KEY:-sdkwork-api-router-local}
      SDKWORK_USER_CENTER_APP_ID: ${SDKWORK_USER_CENTER_APP_ID:-sdkwork-api-router}
      SDKWORK_USER_CENTER_LOCAL_API_BASE_PATH: ${SDKWORK_USER_CENTER_LOCAL_API_BASE_PATH:-/api/app/v1/user-center}
      SDKWORK_USER_CENTER_SQLITE_PATH: ${SDKWORK_USER_CENTER_SQLITE_PATH:-/opt/sdkwork/data/user-center.db}
      SDKWORK_USER_CENTER_DATABASE_URL: ${SDKWORK_USER_CENTER_DATABASE_URL:-}
      SDKWORK_USER_CENTER_SCHEMA_NAME: ${SDKWORK_USER_CENTER_SCHEMA_NAME:-}
      SDKWORK_USER_CENTER_TABLE_PREFIX: ${SDKWORK_USER_CENTER_TABLE_PREFIX:-rp_uc_}
      SDKWORK_USER_CENTER_APP_API_BASE_URL: ${SDKWORK_USER_CENTER_APP_API_BASE_URL:-}
      SDKWORK_USER_CENTER_EXTERNAL_BASE_URL: ${SDKWORK_USER_CENTER_EXTERNAL_BASE_URL:-}
      SDKWORK_USER_CENTER_SECRET_ID: ${SDKWORK_USER_CENTER_SECRET_ID:-}
      SDKWORK_USER_CENTER_SHARED_SECRET: ${SDKWORK_USER_CENTER_SHARED_SECRET:-}
      SDKWORK_USER_CENTER_AUTHORIZATION_HEADER_NAME: ${SDKWORK_USER_CENTER_AUTHORIZATION_HEADER_NAME:-Authorization}
      SDKWORK_USER_CENTER_ACCESS_TOKEN_HEADER_NAME: ${SDKWORK_USER_CENTER_ACCESS_TOKEN_HEADER_NAME:-Access-Token}
      SDKWORK_USER_CENTER_REFRESH_TOKEN_HEADER_NAME: ${SDKWORK_USER_CENTER_REFRESH_TOKEN_HEADER_NAME:-Refresh-Token}
      SDKWORK_USER_CENTER_SESSION_HEADER_NAME: ${SDKWORK_USER_CENTER_SESSION_HEADER_NAME:-x-sdkwork-user-center-session-id}
      SDKWORK_USER_CENTER_AUTHORIZATION_SCHEME: ${SDKWORK_USER_CENTER_AUTHORIZATION_SCHEME:-Bearer}
      SDKWORK_USER_CENTER_ALLOW_AUTHORIZATION_FALLBACK_TO_ACCESS_TOKEN: ${SDKWORK_USER_CENTER_ALLOW_AUTHORIZATION_FALLBACK_TO_ACCESS_TOKEN:-true}
      SDKWORK_USER_CENTER_HANDSHAKE_FRESHNESS_WINDOW_MS: ${SDKWORK_USER_CENTER_HANDSHAKE_FRESHNESS_WINDOW_MS:-30000}
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://127.0.0.1:3001/api/v1/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  sdkwork-postgres:
