[env]
# Pingora pulls libz-ng-sys via flate2(zlib-ng). On Windows, recent toolchains
# can cause cmake's generator probe to guess an unsupported future Visual Studio
# version. Default to Ninja for direct cargo builds while still allowing release
# scripts and CI jobs to override these values explicitly.
CMAKE_GENERATOR = { value = "Ninja", force = false }
HOST_CMAKE_GENERATOR = { value = "Ninja", force = false }
